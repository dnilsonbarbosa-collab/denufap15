<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1a237e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="Anotações">
    <meta name="apple-mobile-web-app-title" content="Anotações">
    <meta name="msapplication-TileColor" content="#1a237e">
    <meta name="msapplication-navbutton-color" content="#1a237e">
    <title>Sistema de Anotações</title>
    
    <!-- jsPDF para exportação PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    
    <!-- Ícones para instalação no celular -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect fill='%231a237e' width='180' height='180' rx='40'/%3E%3Ctext x='90' y='115' font-size='80' text-anchor='middle' fill='white'%3E📝%3C/text%3E%3C/svg%3E">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect fill='%231a237e' width='192' height='192' rx='40'/%3E%3Ctext x='96' y='125' font-size='90' text-anchor='middle' fill='white'%3E📝%3C/text%3E%3C/svg%3E">
    <link rel="shortcut icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect fill='%231a237e' width='192' height='192' rx='40'/%3E%3Ctext x='96' y='125' font-size='90' text-anchor='middle' fill='white'%3E📝%3C/text%3E%3C/svg%3E">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #1a237e;
            --primary-light: #3949ab;
            --accent: #ff4081;
            --success: #4caf50;
            --warning: #ff9800;
            --danger: #f44336;
            --info: #2196f3;
            --bg: #f5f5f5;
            --card: #ffffff;
            --text: #212121;
            --text-secondary: #757575;
            --border: #e0e0e0;
            --sidebar-width: 280px;
            --max-content-width: 1400px;
        }

        html {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 1024px) {
            body {
                flex-direction: row;
            }
        }

        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            padding: 16px 20px;
            padding-top: max(16px, env(safe-area-inset-top));
            box-shadow: 0 4px 20px rgba(26, 35, 126, 0.3);
            z-index: 100;
            flex-shrink: 0;
        }

        @media (min-width: 1024px) {
            .header {
                width: var(--sidebar-width);
                height: 100vh;
                display: flex;
                flex-direction: column;
                padding: 24px;
                padding-top: 24px;
                position: fixed;
                left: 0;
                top: 0;
            }
        }

        .header h1 {
            font-size: 1.3rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        @media (min-width: 1024px) {
            .header h1 {
                font-size: 1.5rem;
                margin-bottom: 24px;
            }
        }

        .header-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        @media (min-width: 1024px) {
            .header-actions {
                flex-direction: column;
                gap: 12px;
                margin-top: 0;
            }
        }

        .btn-icon {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        @media (min-width: 1024px) {
            .btn-icon {
                width: 100%;
                height: auto;
                padding: 12px 16px;
                border-radius: 12px;
                justify-content: flex-start;
                gap: 12px;
                font-size: 0.95rem;
                font-weight: 500;
            }
            
            .btn-icon::after {
                content: attr(title);
            }
        }

        .btn-icon:active {
            transform: scale(0.95);
            background: rgba(255,255,255,0.3);
        }

        .content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 16px;
            padding-bottom: max(80px, env(safe-area-inset-bottom) + 80px);
            -webkit-overflow-scrolling: touch;
        }

        @media (min-width: 1024px) {
            .content {
                margin-left: var(--sidebar-width);
                padding: 32px;
                max-width: calc(var(--max-content-width) - var(--sidebar-width));
            }
        }

        @media (min-width: 1400px) {
            .content {
                max-width: calc(100% - var(--sidebar-width));
                padding: 40px;
            }
        }

        .filters {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            overflow-x: auto;
            padding-bottom: 4px;
            -webkit-overflow-scrolling: touch;
        }

        @media (min-width: 1024px) {
            .filters {
                flex-wrap: wrap;
                overflow-x: visible;
                gap: 12px;
            }
        }

        .filter-chip {
            padding: 8px 16px;
            border-radius: 20px;
            border: 2px solid var(--border);
            background: white;
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
        }

        @media (min-width: 1024px) {
            .filter-chip {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }

        .filter-chip.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .filter-chip.has-selection {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .cards-container {
            display: grid;
            gap: 12px;
        }

        @media (min-width: 768px) {
            .cards-container {
                grid-template-columns: repeat(2, 1fr);
                gap: 16px;
            }
        }

        @media (min-width: 1400px) {
            .cards-container {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            border-left: 4px solid var(--border);
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }

        @media (min-width: 1024px) {
            .card {
                padding: 20px;
            }
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
        }

        .card:active {
            transform: scale(0.98);
        }

        .card.abonada {
            border-left-color: var(--info);
        }

        .card.justificada {
            border-left-color: var(--success);
        }

        .card.punicao-pendente {
            border-left-color: var(--warning);
        }

        .card.punicao-cumprida {
            border-left-color: var(--success);
            opacity: 0.9;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            gap: 10px;
        }

        .soldado-info {
            flex: 1;
            min-width: 0;
        }

        .turma-badge {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 6px;
        }

        @media (min-width: 1024px) {
            .turma-badge {
                font-size: 0.8rem;
                padding: 6px 12px;
            }
        }

        .nome-guerra {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 4px;
            word-break: break-word;
        }

        @media (min-width: 1024px) {
            .nome-guerra {
                font-size: 1.2rem;
            }
        }

        .numero {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .status-section {
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: flex-end;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        @media (min-width: 1024px) {
            .status-badge {
                font-size: 0.8rem;
                padding: 8px 14px;
            }
        }

        .status-badge.abonada {
            background: #e3f2fd;
            color: var(--info);
        }

        .status-badge.justificada {
            background: #e8f5e9;
            color: var(--success);
        }

        .status-badge.punicao {
            background: #fff3e0;
            color: var(--warning);
        }

        .status-badge.punicao.cumprida {
            background: #e8f5e9;
            color: var(--success);
        }

        .sub-status {
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 12px;
            font-weight: 600;
        }

        @media (min-width: 1024px) {
            .sub-status {
                font-size: 0.75rem;
            }
        }

        .sub-status.pendente {
            background: #fff3e0;
            color: var(--warning);
        }

        .sub-status.cumprida {
            background: #e8f5e9;
            color: var(--success);
        }

        .card-body {
            margin-bottom: 12px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid var(--border);
            gap: 10px;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 500;
            flex-shrink: 0;
        }

        @media (min-width: 1024px) {
            .info-label {
                font-size: 0.85rem;
            }
        }

        .info-value {
            font-size: 0.85rem;
            color: var(--text);
            font-weight: 600;
            text-align: right;
            word-break: break-word;
        }

        @media (min-width: 1024px) {
            .info-value {
                font-size: 0.9rem;
            }
        }

        .motivo {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 10px;
            margin-top: 10px;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        @media (min-width: 1024px) {
            .motivo {
                padding: 14px;
                font-size: 0.95rem;
            }
        }

        .card-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .btn-small {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        @media (min-width: 1024px) {
            .btn-small {
                padding: 12px;
                font-size: 0.9rem;
            }
        }

        .btn-edit {
            background: #e3f2fd;
            color: var(--primary);
        }

        .btn-edit:hover {
            background: #bbdefb;
        }

        .btn-delete {
            background: #ffebee;
            color: var(--danger);
        }

        .btn-delete:hover {
            background: #ffcdd2;
        }

        .btn-small:active {
            transform: scale(0.95);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            display: flex;
            align-items: flex-end;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--card);
            width: 100%;
            max-height: 90vh;
            border-radius: 24px 24px 0 0;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 768px) {
            .modal {
                max-width: 600px;
                margin: 0 auto;
                border-radius: 24px;
                max-height: 85vh;
            }
            
            .modal-overlay {
                align-items: center;
                padding: 20px;
            }
        }

        .modal-overlay.active .modal {
            transform: translateY(0);
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 1.2rem;
            font-weight: 700;
        }

        .btn-close {
            background: none;
            border: none;
            font-size: 1.8rem;
            color: var(--text-secondary);
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .btn-close:hover {
            background: #f5f5f5;
        }

        .modal-body {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
        }

        @media (min-width: 768px) {
            .modal-body {
                padding: 24px;
            }
        }

        .form-group {
            margin-bottom: 16px;
        }

        @media (min-width: 768px) {
            .form-group {
                margin-bottom: 20px;
            }
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s;
            background: white;
            -webkit-appearance: none;
        }

        @media (min-width: 768px) {
            .form-input, .form-select, .form-textarea {
                padding: 16px;
                font-size: 1.05rem;
            }
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-textarea {
            min-height: 80px;
            resize: vertical;
        }

        @media (min-width: 768px) {
            .form-textarea {
                min-height: 100px;
            }
        }

        .date-input-wrapper {
            position: relative;
        }

        .date-input-wrapper input {
            padding-right: 45px;
        }

        .date-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
            font-size: 1.2rem;
            pointer-events: none;
        }

        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        @media (min-width: 768px) {
            .radio-group {
                gap: 12px;
            }
        }

        .radio-option {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
        }

        @media (min-width: 768px) {
            .radio-option {
                padding: 16px;
            }
        }

        .radio-option:hover {
            border-color: var(--primary-light);
        }

        .radio-option:active {
            transform: scale(0.98);
        }

        .radio-option.selected {
            border-color: var(--primary);
            background: #e8eaf6;
        }

        .radio-option input[type="radio"] {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            accent-color: var(--primary);
        }

        .radio-label {
            font-weight: 600;
            font-size: 0.95rem;
        }

        @media (min-width: 768px) {
            .radio-label {
                font-size: 1rem;
            }
        }

        .radio-sublabel {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .sub-options {
            margin-left: 32px;
            margin-top: 10px;
            display: none;
        }

        .sub-options.show {
            display: block;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-footer {
            padding: 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
        }

        @media (min-width: 768px) {
            .modal-footer {
                padding: 24px;
            }
        }

        .btn-primary {
            flex: 1;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(26, 35, 126, 0.3);
            transition: all 0.3s;
        }

        @media (min-width: 768px) {
            .btn-primary {
                padding: 18px;
                font-size: 1.05rem;
            }
        }

        .btn-primary:hover {
            box-shadow: 0 6px 20px rgba(26, 35, 126, 0.4);
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            flex: 1;
            background: transparent;
            color: var(--text-secondary);
            border: 2px solid var(--border);
            padding: 16px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }

        @media (min-width: 768px) {
            .btn-secondary {
                padding: 18px;
                font-size: 1.05rem;
            }
        }

        .btn-secondary:hover {
            background: #f5f5f5;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        @media (min-width: 1024px) {
            .empty-state {
                padding: 100px 20px;
            }
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        @media (min-width: 1024px) {
            .empty-icon {
                font-size: 5rem;
            }
        }

        .empty-text {
            font-size: 1.1rem;
            margin-bottom: 8px;
        }

        @media (min-width: 1024px) {
            .empty-text {
                font-size: 1.3rem;
            }
        }

        .empty-subtext {
            font-size: 0.9rem;
            opacity: 0.7;
        }

        .fab {
            position: fixed;
            bottom: max(24px, env(safe-area-inset-bottom));
            right: 24px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--accent) 0%, #f50057 100%);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 1.8rem;
            box-shadow: 0 6px 20px rgba(255, 64, 129, 0.4);
            cursor: pointer;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        @media (min-width: 1024px) {
            .fab {
                width: auto;
                height: auto;
                padding: 16px 32px;
                border-radius: 50px;
                font-size: 1rem;
                font-weight: 600;
                gap: 8px;
                right: 40px;
                bottom: 40px;
            }
            
            .fab::after {
                content: 'Nova Anotação';
            }
        }

        .fab:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(255, 64, 129, 0.5);
        }

        .fab:active {
            transform: scale(0.9);
        }

        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #333;
            color: white;
            padding: 14px 24px;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: 500;
            z-index: 2000;
            opacity: 0;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            white-space: nowrap;
        }

        @media (min-width: 1024px) {
            .toast {
                bottom: 120px;
                padding: 16px 32px;
                font-size: 1rem;
            }
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .stats-bar {
            display: flex;
            justify-content: space-around;
            padding: 12px;
            background: white;
            border-radius: 12px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        @media (min-width: 768px) {
            .stats-bar {
                padding: 16px;
                margin-bottom: 24px;
            }
        }

        @media (min-width: 1024px) {
            .stats-bar {
                justify-content: flex-start;
                gap: 40px;
                padding: 20px 24px;
            }
        }

        .stat-item {
            text-align: center;
        }

        @media (min-width: 1024px) {
            .stat-item {
                text-align: left;
            }
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        @media (min-width: 768px) {
            .stat-value {
                font-size: 1.8rem;
            }
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        @media (min-width: 768px) {
            .stat-label {
                font-size: 0.85rem;
            }
        }

        .pdf-options {
            background: #f5f5f5;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 16px;
        }

        @media (min-width: 768px) {
            .pdf-options {
                padding: 20px;
            }
        }

        .pdf-option-title {
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--text);
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        @media (min-width: 768px) {
            .checkbox-group {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

        .checkbox-option {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 8px;
            background: white;
            border-radius: 8px;
            border: 2px solid transparent;
            transition: all 0.3s;
