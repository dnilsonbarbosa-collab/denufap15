        @media (min-width: 768px) {
            .checkbox-option {
                padding: 12px;
            }
        }

        .checkbox-option:hover {
            border-color: var(--primary-light);
        }

        .checkbox-option:active {
            border-color: var(--primary);
        }

        .checkbox-option input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: var(--primary);
        }

        .content::-webkit-scrollbar {
            width: 8px;
            height: 0;
        }

        .content::-webkit-scrollbar-track {
            background: transparent;
        }

        .content::-webkit-scrollbar-thumb {
            background: #bdbdbd;
            border-radius: 4px;
        }

        .content::-webkit-scrollbar-thumb:hover {
            background: #9e9e9e;
        }

        .hidden {
            display: none !important;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card {
            animation: fadeInUp 0.4s ease-out;
        }

        .logo-desktop {
            display: none;
        }

        @media (min-width: 1024px) {
            .logo-desktop {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 80px;
                height: 80px;
                background: rgba(255,255,255,0.15);
                border-radius: 20px;
                margin-bottom: 24px;
                font-size: 3rem;
                backdrop-filter: blur(10px);
            }
        }

        .desktop-nav {
            display: none;
        }

        @media (min-width: 1024px) {
            .desktop-nav {
                display: flex;
                flex-direction: column;
                gap: 8px;
                margin-top: auto;
            }
        }

        /* Estilos para lista de seleção de filtro */
        .filter-list {
            max-height: 300px;
            overflow-y: auto;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: white;
        }

        .filter-list-item {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .filter-list-item:last-child {
            border-bottom: none;
        }

        .filter-list-item:hover {
            background: #f5f5f5;
        }

        .filter-list-item.selected {
            background: #e8eaf6;
            border-left: 4px solid var(--primary);
        }

        .filter-list-item-info {
            display: flex;
            flex-direction: column;
        }

        .filter-list-item-primary {
            font-weight: 600;
            color: var(--text);
        }

        .filter-list-item-secondary {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .filter-list-item-count {
            background: var(--primary);
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .filter-search {
            margin-bottom: 12px;
        }

        .clear-filter-btn {
            background: #ffebee;
            color: var(--danger);
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
            width: 100%;
            transition: all 0.3s;
        }

        .clear-filter-btn:hover {
            background: #ffcdd2;
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo-desktop">📝</div>
        <h1>📝 Anotações</h1>
        <div class="header-actions">
            <button class="btn-icon" onclick="openPdfModal()" title="Exportar PDF">📄</button>
            <button class="btn-icon" onclick="exportData()" title="Exportar BACKUP">📤</button>
            <button class="btn-icon" onclick="importData()" title="Importar BACKUP">📥</button>
            <button class="btn-icon" onclick="clearAll()" title="Limpar Tudo">🗑️</button>
        </div>
        <div class="desktop-nav">
            <div style="font-size: 0.75rem; opacity: 0.7; margin-top: 20px; text-align: center;">
                Sistema de Gestão<br>de Anotações v1.0
            </div>
        </div>
    </header>

    <main class="content" id="content">
        <div class="stats-bar" id="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="stat-total">0</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-abonadas">0</div>
                <div class="stat-label">Abonadas</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-justificadas">0</div>
                <div class="stat-label">Justificadas</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-punicoes">0</div>
                <div class="stat-label">Punições</div>
            </div>
        </div>

        <div class="filters">
            <button class="filter-chip active" onclick="filterStatus('todos')" id="filtro-todos">Todos</button>
            <button class="filter-chip" onclick="filterStatus('abonada')">Abonadas</button>
            <button class="filter-chip" onclick="filterStatus('justificada')">Justificadas</button>
            <button class="filter-chip" onclick="filterStatus('punicao-pendente')">Punições Pendentes</button>
            <button class="filter-chip" onclick="filterStatus('punicao-cumprida')">Punições Cumpridas</button>
            <button class="filter-chip" onclick="openFilterAnotadoModal()" id="filtro-anotado" title="Filtrar por aluno anotado">👤 Anotado</button>
            <button class="filter-chip" onclick="openFilterAnotadorModal()" id="filtro-anotador" title="Filtrar por quem anotou">📝 Anotador</button>
        </div>
        
        <div class="cards-container" id="lista-anotacoes"></div>
    </main>

    <button class="fab" onclick="openModal()">+</button>

    <!-- Modal de Anotação -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title" id="modal-title">Nova Anotação</h2>
                <button class="btn-close" onclick="closeModal()">×</button>
            </div>
            
            <div class="modal-body">
                <form id="form-anotacao">
                    <input type="hidden" id="id">
                    
                    <div class="form-group">
                        <label class="form-label">Turma *</label>
                        <select class="form-select" id="turma" required>
                            <option value="">Selecione...</option>
                            <option value="CFSD">CFSD</option>
                            <option value="CFS">CFS</option>
                            <option value="NUFAP 15">NUFAP 15</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Número *</label>
                        <input type="number" class="form-input" id="numero" placeholder="Ex: 107" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Nome de Guerra *</label>
                        <input type="text" class="form-input" id="nome-guerra" placeholder="Ex: MARTINS" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Data *</label>
                        <div class="date-input-wrapper">
                            <input type="date" class="form-input" id="data" required>
                            <span class="date-icon">📅</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Anotador</label>
                        <input type="text" class="form-input" id="anotador" placeholder="Ex: TENENTE ALESSANDRA">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Norma 25</label>
                        <input type="text" class="form-input" id="norma" placeholder="Ex: 105">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Grau da Anotação</label>
                        <select class="form-select" id="grau">
                            <option value="LEVE">LEVE (L)</option>
                            <option value="MÉDIA">MÉDIA (M)</option>
                            <option value="GRAVE">GRAVE (G)</option>
                            <option value="GRAVÍSSIMA">GRAVÍSSIMA (GA)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Motivo *</label>
                        <textarea class="form-textarea" id="motivo" placeholder="Descreva o motivo da anotação..." required></textarea>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Situação *</label>
                        <div class="radio-group">
                            <label class="radio-option" onclick="selectSituacao('abonada')">
                                <input type="radio" name="situacao" value="abonada" id="sit-abonada">
                                <div>
                                    <div class="radio-label">✅ Abonada</div>
                                    <div class="radio-sublabel">Anotação cancelada/removida</div>
                                </div>
                            </label>

                            <label class="radio-option" onclick="selectSituacao('justificada')">
                                <input type="radio" name="situacao" value="justificada" id="sit-justificada">
                                <div>
                                    <div class="radio-label">📋 Justificada</div>
                                    <div class="radio-sublabel">Motivo aceito, sem punição</div>
                                </div>
                            </label>

                            <label class="radio-option" onclick="selectSituacao('punicao')">
                                <input type="radio" name="situacao" value="punicao" id="sit-punicao">
                                <div>
                                    <div class="radio-label">⚖️ Punição Aplicada</div>
                                    <div class="radio-sublabel">Houve penalidade disciplinar</div>
                                </div>
                            </label>
                        </div>

                        <div class="sub-options" id="sub-punicao">
                            <label class="form-label" style="margin-top: 10px;">Estado da Punição *</label>
                            <div class="radio-group">
                                <label class="radio-option" onclick="selectSubStatus('pendente')">
                                    <input type="radio" name="substatus" value="pendente" id="sub-pendente">
                                    <div>
                                        <div class="radio-label">⏳ Pendente</div>
                                        <div class="radio-sublabel">Aguardando cumprimento</div>
                                    </div>
                                </label>

                                <label class="radio-option" onclick="selectSubStatus('cumprida')">
                                    <input type="radio" name="substatus" value="cumprida" id="sub-cumprida">
                                    <div>
                                        <div class="radio-label">✓ Cumprida</div>
                                        <div class="radio-sublabel">Punição já executada</div>
                                    </div>
                                </label>
                            </div>

                            <div class="form-group" style="margin-top: 12px;">
                                <label class="form-label">Tipo de Punição</label>
                                <input type="text" class="form-input" id="tipo-punicao" placeholder="Ex: RR, ID, TEHM, DE...">
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            
            <div class="modal-footer">
                <button type="button" class="btn-secondary" onclick="closeModal()">Cancelar</button>
                <button type="button" class="btn-primary" onclick="saveAnotacao()">Salvar</button>
            </div>
        </div>
    </div>

    <!-- Modal de Exportação PDF -->
    <div class="modal-overlay" id="pdf-modal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">Exportar Relatório PDF</h2>
                <button class="btn-close" onclick="closePdfModal()">×</button>
            </div>
            
            <div class="modal-body">
                <div class="pdf-options">
                    <div class="pdf-option-title">Selecione os status para incluir:</div>
                    <div class="checkbox-group">
                        <label class="checkbox-option">
                            <input type="checkbox" id="pdf-abonada" checked>
                            <span>✅ Abonadas</span>
                        </label>
                        <label class="checkbox-option">
                            <input type="checkbox" id="pdf-justificada" checked>
                            <span>📋 Justificadas</span>
                        </label>
                        <label class="checkbox-option">
                            <input type="checkbox" id="pdf-punicao-pendente" checked>
                            <span>⏳ Punições Pendentes</span>
                        </label>
                        <label class="checkbox-option">
                            <input type="checkbox" id="pdf-punicao-cumprida" checked>
                            <span>✓ Punições Cumpridas</span>
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Filtrar por Aluno (Anotado)</label>
                    <select class="form-select" id="pdf-filtro-anotado">
                        <option value="">Todos os alunos</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Filtrar por Quem Anotou (Anotador)</label>
                    <select class="form-select" id="pdf-filtro-anotador">
                        <option value="">Todos os anotadores</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Título do Relatório</label>
                    <input type="text" class="form-input" id="pdf-titulo" value="Relatório de Anotações">
                </div>

                <div class="form-group">
                    <label class="form-label">Subtítulo / Período</label>
                    <input type="text" class="form-input" id="pdf-subtitulo" placeholder="Ex: Novembro 2025">
                </div>

                <div class="form-group">
                    <label class="form-label">Ordenar por</label>
                    <select class="form-select" id="pdf-ordenar">
                        <option value="data">Data (mais recente primeiro)</option>
                        <option value="turma">Turma</option>
                        <option value="nome">Nome de Guerra</option>
                        <option value="status">Status</option>
                    </select>
                </div>
            </div>
            
            <div class="modal-footer">
                <button type="button" class="btn-secondary" onclick="closePdfModal()">Cancelar</button>
                <button type="button" class="btn-primary" onclick="exportarPDF()">📄 Gerar PDF</button>
            </div>
        </div>
    </div>

    <!-- Modal de Filtro por Anotado (Aluno) -->
    <div class="modal-overlay" id="filter-anotado-modal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">Filtrar por Aluno</h2>
                <button class="btn-close" onclick="closeFilterAnotadoModal()">×</button>
            </div>
            
            <div class="modal-body">
                <div class="form-group filter-search">
                    <input type="text" class="form-input" id="search-anotado" placeholder="🔍 Buscar aluno..." oninput="filterAnotadoList()">
                </div>
                
                <div class="filter-list" id="lista-anotados">
                    <!-- Lista populada via JS -->
                </div>

                <button class="clear-filter-btn" onclick="clearAnotadoFilter()" id="clear-anotado-btn" style="display: none;">
                    ❌ Limpar filtro de aluno
                </button>
            </div>
            
            <div class="modal-footer">
                <button type="button" class="btn-secondary" onclick="closeFilterAnotadoModal()">Fechar</button>
            </div>
        </div>
    </div>

    <!-- Modal de Filtro por Anotador -->
    <div class="modal-overlay" id="filter-anotador-modal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">Filtrar por Quem Anotou</h2>
                <button class="btn-close" onclick="closeFilterAnotadorModal()">×</button>
            </div>
            
            <div class="modal-body">
                <div class="form-group filter-search">
                    <input type="text" class="form-input" id="search-anotador" placeholder="🔍 Buscar anotador..." oninput="filterAnotadorList()">
                </div>
                
                <div class="filter-list" id="lista-anotadores">
                    <!-- Lista populada via JS -->
                </div>

                <button class="clear-filter-btn" onclick="clearAnotadorFilter()" id="clear-anotador-btn" style="display: none;">
                    ❌ Limpar filtro de anotador
                </button>
            </div>
            
            <div class="modal-footer">
                <button type="button" class="btn-secondary" onclick="closeFilterAnotadorModal()">Fechar</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let anotacoes = JSON.parse(localStorage.getItem('anotacoes')) || [];
        let filtroAtual = 'todos';
        let filtroAnotado = null; // nome do aluno selecionado
        let filtroAnotador = null; // nome do anotador selecionado
        let editandoId = null;
        let situacaoAtual = null;
        let subStatusAtual = null;

        const { jsPDF } = window.jspdf;

        document.addEventListener('DOMContentLoaded', () => {
            renderAnotacoes();
            updateStats();
            
            if (document.documentElement.requestFullscreen) {
                document.addEventListener('click', () => {
                    document.documentElement.requestFullscreen().catch(() => {});
                }, { once: true });
            }
        });

        function updateStats() {
            const total = anotacoes.length;
            const abonadas = anotacoes.filter(a => a.situacao === 'abonada').length;
            const justificadas = anotacoes.filter(a => a.situacao === 'justificada').length;
            const punicoes = anotacoes.filter(a => a.situacao === 'punicao').length;
            
            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-abonadas').textContent = abonadas;
            document.getElementById('stat-justificadas').textContent = justificadas;
            document.getElementById('stat-punicoes').textContent = punicoes;
        }

        function getAnotadosList() {
            const anotados = {};
            anotacoes.forEach(a => {
                const key = `${a.nomeGuerra} (Nº ${a.numero} - ${a.turma})`;
                if (!anotados[key]) {
                    anotados[key] = {
                        nome: a.nomeGuerra,
                        numero: a.numero,
                        turma: a.turma,
                        count: 0
                    };
                }
                anotados[key].count++;
            });
            return Object.entries(anotados).sort((a, b) => a[1].nome.localeCompare(b[1].nome));
        }

        function getAnotadoresList() {
            const anotadores = {};
            anotacoes.forEach(a => {
                const key = a.anotador || 'Não informado';
                if (!anotadores[key]) {
                    anotadores[key] = {
                        nome: key,
                        count: 0
                    };
                }
                anotadores[key].count++;
            });
            return Object.entries(anotadores).sort((a, b) => a[0].localeCompare(b[0]));
        }

        function openFilterAnotadoModal() {
            const modal = document.getElementById('filter-anotado-modal');
            const lista = document.getElementById('lista-anotados');
            const anotados = getAnotadosList();
            
            lista.innerHTML = anotados.map(([key, info]) => `
                <div class="filter-list-item ${filtroAnotado === info.nome ? 'selected' : ''}" 
                     onclick="selectAnotado('${info.nome.replace(/'/g, "\\'")}')" 
                     data-nome="${info.nome.toLowerCase()}">
                    <div class="filter-list-item-info">
                        <span class="filter-list-item-primary">${info.nome}</span>
                        <span class="filter-list-item-secondary">Nº ${info.numero} • ${info.turma}</span>
                    </div>
                    <span class="filter-list-item-count">${info.count} anotaç${info.count > 1 ? 'ões' : 'ão'}</span>
                </div>
            `).join('');
            
            document.getElementById('search-anotado').value = '';
            document.getElementById('clear-anotado-btn').style.display = filtroAnotado ? 'block' : 'none';
            
            modal.classList.add('active');
        }

        function closeFilterAnotadoModal() {
            document.getElementById('filter-anotado-modal').classList.remove('active');
        }

        function filterAnotadoList() {
            const search = document.getElementById('search-anotado').value.toLowerCase();
            const items = document.querySelectorAll('#lista-anotados .filter-list-item');
            
            items.forEach(item => {
                const nome = item.getAttribute('data-nome');
                item.style.display = nome.includes(search) ? 'flex' : 'none';
            });
        }

        function selectAnotado(nome) {
            filtroAnotado = nome;
            filtroAtual = 'anotado';
            
            // Atualizar aparência dos botões de filtro
            document.querySelectorAll('.filter-chip').forEach(chip => chip.classList.remove('active'));
            document.getElementById('filtro-anotado').classList.add('active', 'has-selection');
            document.getElementById('filtro-anotado').textContent = `👤 ${nome}`;
            
            renderAnotacoes();
            closeFilterAnotadoModal();
            showToast(`👤 Filtrando por: ${nome}`);
        }

        function clearAnotadoFilter() {
            filtroAnotado = null;
            document.getElementById('filtro-anotado').classList.remove('active', 'has-selection');
            document.getElementById('filtro-anotado').textContent = '👤 Anotado';
            
            if (filtroAtual === 'anotado') {
                filtroAtual = 'todos';
                document.getElementById('filtro-todos').classList.add('active');
            }
            
            renderAnotacoes();
            closeFilterAnotadoModal();
            showToast('Filtro de aluno removido');
        }

        function openFilterAnotadorModal() {
            const modal = document.getElementById('filter-anotador-modal');
            const lista = document.getElementById('lista-anotadores');
            const anotadores = getAnotadoresList();
            
            lista.innerHTML = anotadores.map(([key, info]) => `
                <div class="filter-list-item ${filtroAnotador === info.nome ? 'selected' : ''}" 
                     onclick="selectAnotador('${info.nome.replace(/'/g, "\\'")}')" 
                     data-nome="${info.nome.toLowerCase()}">
                    <div class="filter-list-item-info">
                        <span class="filter-list-item-primary">${info.nome}</span>
                    </div>
                    <span class="filter-list-item-count">${info.count} anotaç${info.count > 1 ? 'ões' : 'ão'}</span>
                </div>
            `).join('');
            
            document.getElementById('search-anotador').value = '';
            document.getElementById('clear-anotador-btn').style.display = filtroAnotador ? 'block' : 'none';
            
            modal.classList.add('active');
        }

        function closeFilterAnotadorModal() {
            document.getElementById('filter-anotador-modal').classList.remove('active');
        }

        function filterAnotadorList() {
            const search = document.getElementById('search-anotador').value.toLowerCase();
            const items = document.querySelectorAll('#lista-anotadores .filter-list-item');
            
            items.forEach(item => {
                const nome = item.getAttribute('data-nome');
                item.style.display = nome.includes(search) ? 'flex' : 'none';
            });
        }

        function selectAnotador(nome) {
            filtroAnotador = nome;
            filtroAtual = 'anotador';
            
            document.querySelectorAll('.filter-chip').forEach(chip => chip.classList.remove('active'));
            document.getElementById('filtro-anotador').classList.add('active', 'has-selection');
            document.getElementById('filtro-anotador').textContent = `📝 ${nome.length > 15 ? nome.substring(0, 15) + '...' : nome}`;
            
            renderAnotacoes();
            closeFilterAnotadorModal();
            showToast(`📝 Filtrando por: ${nome}`);
        }

        function clearAnotadorFilter() {
            filtroAnotador = null;
            document.getElementById('filtro-anotador').classList.remove('active', 'has-selection');
            document.getElementById('filtro-anotador').textContent = '📝 Anotador';
            
            if (filtroAtual === 'anotador') {
                filtroAtual = 'todos';
                document.getElementById('filtro-todos').classList.add('active');
            }
            
            renderAnotacoes();
            closeFilterAnotadorModal();
            showToast('Filtro de anotador removido');
        }

        function renderAnotacoes() {
            const container = document.getElementById('lista-anotacoes');
            let filtradas = anotacoes;
            
            // Aplicar filtros de status
            if (filtroAtual === 'abonada') {
                filtradas = anotacoes.filter(a => a.situacao === 'abonada');
            } else if (filtroAtual === 'justificada') {
                filtradas = anotacoes.filter(a => a.situacao === 'justificada');
            } else if (filtroAtual === 'punicao-pendente') {
                filtradas = anotacoes.filter(a => a.situacao === 'punicao' && a.subStatus === 'pendente');
            } else if (filtroAtual === 'punicao-cumprida') {
                filtradas = anotacoes.filter(a => a.situacao === 'punicao' && a.subStatus === 'cumprida');
            } else if (filtroAtual === 'anotado') {
                filtradas = anotacoes.filter(a => a.nomeGuerra === filtroAnotado);
            } else if (filtroAtual === 'anotador') {
                filtradas = anotacoes.filter(a => (a.anotador || 'Não informado') === filtroAnotador);
            }
            
            // Aplicar filtros cruzados (se houver filtro de anotado/anotador ativo junto com status)
            if (filtroAnotado && filtroAtual !== 'anotado') {
                filtradas = filtradas.filter(a => a.nomeGuerra === filtroAnotado);
            }
            if (filtroAnotador && filtroAtual !== 'anotador') {
                filtradas = filtradas.filter(a => (a.anotador || 'Não informado') === filtroAnotador);
            }
            
            filtradas.sort((a, b) => new Date(b.data) - new Date(a.data));

            if (filtradas.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📋</div>
                        <div class="empty-text">Nenhuma anotação encontrada</div>
                        <div class="empty-subtext">${filtroAnotado || filtroAnotador ? 'Tente remover os filtros' : 'Toque no + para adicionar'}</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = filtradas.map(a => {
                let cardClass = a.situacao;
                let statusBadge = '';
                let subStatusHtml = '';
                
                if (a.situacao === 'abonada') {
                    statusBadge = '<span class="status-badge abonada">✅ ABONADA</span>';
                } else if (a.situacao === 'justificada') {
                    statusBadge = '<span class="status-badge justificada">📋 JUSTIFICADA</span>';
                } else if (a.situacao === 'punicao') {
                    cardClass += ` punicao-${a.subStatus}`;
                    const subStatusClass = a.subStatus === 'cumprida' ? 'cumprida' : 'pendente';
                    const subStatusText = a.subStatus === 'cumprida' ? '✓ CUMPRIDA' : '⏳ PENDENTE';
                    statusBadge = `<span class="status-badge punicao ${a.subStatus}">⚖️ PUNIÇÃO</span>`;
                    subStatusHtml = `<span class="sub-status ${subStatusClass}">${subStatusText}</span>`;
                }

                return `
                    <div class="card ${cardClass}" data-id="${a.id}">
                        <div class="card-header">
                            <div class="soldado-info">
                                <span class="turma-badge">${a.turma}</span>
                                <div class="nome-guerra">${a.nomeGuerra || 'Sem nome'}</div>
                                <div class="numero">Nº ${a.numero}</div>
                            </div>
                            <div class="status-section">
                                ${statusBadge}
                                ${subStatusHtml}
                            </div>
                        </div>
                        
                        <div class="card-body">
                            <div class="info-row">
                                <span class="info-label">📅 Data</span>
                                <span class="info-value">${formatDate(a.data)}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">👤 Anotador</span>
                                <span class="info-value">${a.anotador || '-'}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">📋 Norma</span>
                                <span class="info-value">${a.norma || '-'} (${a.grau || '-'})</span>
                            </div>
                            ${a.situacao === 'punicao' && a.tipoPunicao ? `
                            <div class="info-row">
                                <span class="info-label">⚖️ Tipo</span>
                                <span class="info-value">${a.tipoPunicao}</span>
                            </div>
                            ` : ''}
                            <div class="motivo">
                                <strong>Motivo:</strong> ${a.motivo}
                            </div>
                        </div>
                        
                        <div class="card-actions">
                            <button class="btn-small btn-edit" onclick="editAnotacao('${a.id}')">
                                ✏️ Editar
                            </button>
                            <button class="btn-small btn-delete" onclick="deleteAnotacao('${a.id}')">
                                🗑️ Excluir
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openModal(id = null) {
            const modal = document.getElementById('modal');
            const form = document.getElementById('form-anotacao');
            const title = document.getElementById('modal-title');
            
            editandoId = id;
            situacaoAtual = null;
            subStatusAtual = null;
            
            form.reset();
            document.querySelectorAll('.radio-option').forEach(opt => opt.classList.remove('selected'));
            document.getElementById('sub-punicao').classList.remove('show');
            
            if (id) {
                const a = anotacoes.find(x => x.id === id);
                title.textContent = 'Editar Anotação';
                document.getElementById('turma').value = a.turma;
                document.getElementById('numero').value = a.numero;
                document.getElementById('nome-guerra').value = a.nomeGuerra;
                document.getElementById('data').value = a.data;
                document.getElementById('anotador').value = a.anotador || '';
                document.getElementById('norma').value = a.norma || '';
                document.getElementById('grau').value = a.grau || 'LEVE';
                document.getElementById('motivo').value = a.motivo;
                
                if (a.situacao) {
                    selectSituacao(a.situacao, false);
                    document.getElementById(`sit-${a.situacao}`).checked = true;
                    
                    if (a.situacao === 'punicao' && a.subStatus) {
                        selectSubStatus(a.subStatus, false);
                        document.getElementById(`sub-${a.subStatus}`).checked = true;
                        document.getElementById('tipo-punicao').value = a.tipoPunicao || '';
                    }
                }
            } else {
                title.textContent = 'Nova Anotação';
                document.getElementById('data').value = new Date().toISOString().split('T')[0];
            }
            
            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            editandoId = null;
        }

        function selectSituacao(situacao, updateUI = true) {
            situacaoAtual = situacao;
            
            if (updateUI) {
                document.querySelectorAll('.radio-option').forEach(opt => opt.classList.remove('selected'));
                event.currentTarget.classList.add('selected');
            }
            
            const subPunicao = document.getElementById('sub-punicao');
            if (situacao === 'punicao') {
                subPunicao.classList.add('show');
            } else {
                subPunicao.classList.remove('show');
                subStatusAtual = null;
                document.getElementById('tipo-punicao').value = '';
            }
        }

        function selectSubStatus(status, updateUI = true) {
            subStatusAtual = status;
            if (updateUI) {
                const parent = document.getElementById('sub-punicao');
                parent.querySelectorAll('.radio-option').forEach(opt => opt.classList.remove('selected'));
                event.currentTarget.classList.add('selected');
            }
        }

        function saveAnotacao() {
            const turma = document.getElementById('turma').value;
            const numero = document.getElementById('numero').value;
            const nomeGuerra = document.getElementById('nome-guerra').value;
            const data = document.getElementById('data').value;
            const motivo = document.getElementById('motivo').value;
            
            if (!turma || !numero || !nomeGuerra || !data || !motivo) {
                showToast('⚠️ Preencha todos os campos obrigatórios (*)');
                return;
            }
            
            if (!situacaoAtual) {
                showToast('⚠️ Selecione a situação (Abonada, Justificada ou Punição)');
                return;
            }
            
            if (situacaoAtual === 'punicao' && !subStatusAtual) {
                showToast('⚠️ Selecione se a punição está Pendente ou Cumprida');
                return;
            }

            const anotacao = {
                id: editandoId || Date.now().toString(),
                turma,
                numero,
                nomeGuerra: nomeGuerra.toUpperCase(),
                data,
                anotador: document.getElementById('anotador').value,
                norma: document.getElementById('norma').value,
                grau: document.getElementById('grau').value,
                motivo,
                situacao: situacaoAtual,
                subStatus: situacaoAtual === 'punicao' ? subStatusAtual : null,
                tipoPunicao: situacaoAtual === 'punicao' ? document.getElementById('tipo-punicao').value : null
            };

            if (editandoId) {
                const index = anotacoes.findIndex(a => a.id === editandoId);
                anotacoes[index] = anotacao;
                showToast('✅ Anotação atualizada!');
            } else {
                anotacoes.unshift(anotacao);
                showToast('✅ Anotação adicionada!');
            }

            localStorage.setItem('anotacoes', JSON.stringify(anotacoes));
            renderAnotacoes();
            updateStats();
            closeModal();
        }

        function editAnotacao(id) {
            openModal(id);
        }

        function deleteAnotacao(id) {
            if (confirm('Tem certeza que deseja excluir esta anotação?')) {
                anotacoes = anotacoes.filter(a => a.id !== id);
                localStorage.setItem('anotacoes', JSON.stringify(anotacoes));
                renderAnotacoes();
                updateStats();
                showToast('🗑️ Anotação excluída');
            }
        }

        function filterStatus(status) {
            filtroAtual = status;
            
            // Resetar filtros de anotado/anotador ao clicar em filtros de status
            if (status !== 'anotado' && status !== 'anotador') {
                // Não limpar, apenas desativar visualmente se estiverem ativos
            }
            
            document.querySelectorAll('.filter-chip').forEach(chip => {
                if (!chip.id.includes('anotado') && !chip.id.includes('anotador')) {
                    chip.classList.remove('active');
                }
            });
            
            if (event && event.target) {
                event.target.classList.add('active');
            }
            
            renderAnotacoes();
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const [ano, mes, dia] = dateStr.split('-');
            return `${dia}/${mes}/${ano}`;
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function openPdfModal() {
            if (anotacoes.length === 0) {
                showToast('⚠️ Não há anotações para exportar');
                return;
            }
            
            // Popular selects de filtro do PDF
            const selectAnotado = document.getElementById('pdf-filtro-anotado');
            const selectAnotador = document.getElementById('pdf-filtro-anotador');
            
            // Limpar e adicionar opção padrão
            selectAnotado.innerHTML = '<option value="">Todos os alunos</option>';
            selectAnotador.innerHTML = '<option value="">Todos os anotadores</option>';
            
            // Adicionar anotados
            const anotados = getAnotadosList();
            anotados.forEach(([key, info]) => {
                const option = document.createElement('option');
                option.value = info.nome;
                option.textContent = `${info.nome} (Nº ${info.numero} - ${info.turma})`;
                selectAnotado.appendChild(option);
            });
            
            // Adicionar anotadores
            const anotadores = getAnotadoresList();
            anotadores.forEach(([key, info]) => {
                const option = document.createElement('option');
                option.value = info.nome;
                option.textContent = info.nome;
                selectAnotador.appendChild(option);
            });
            
            document.getElementById('pdf-modal').classList.add('active');
        }

        function closePdfModal() {
            document.getElementById('pdf-modal').classList.remove('active');
        }

        function exportarPDF() {
            const incluirAbonadas = document.getElementById('pdf-abonada').checked;
            const incluirJustificadas = document.getElementById('pdf-justificada').checked;
            const incluirPunicaoPendente = document.getElementById('pdf-punicao-pendente').checked;
            const incluirPunicaoCumprida = document.getElementById('pdf-punicao-cumprida').checked;
            
            const filtroPdfAnotado = document.getElementById('pdf-filtro-anotado').value;
            const filtroPdfAnotador = document.getElementById('pdf-filtro-anotador').value;
            
            const titulo = document.getElementById('pdf-titulo').value || 'Relatório de Anotações';
            const subtitulo = document.getElementById('pdf-subtitulo').value;
            const ordenarPor = document.getElementById('pdf-ordenar').value;

            let dadosPDF = anotacoes.filter(a => {
                // Filtro de status
                let incluir = false;
                if (a.situacao === 'abonada' && incluirAbonadas) incluir = true;
                if (a.situacao === 'justificada' && incluirJustificadas) incluir = true;
                if (a.situacao === 'punicao' && a.subStatus === 'pendente' && incluirPunicaoPendente) incluir = true;
                if (a.situacao === 'punicao' && a.subStatus === 'cumprida' && incluirPunicaoCumprida) incluir = true;
                
                if (!incluir) return false;
                
                // Filtro de aluno (anotado)
                if (filtroPdfAnotado && a.nomeGuerra !== filtroPdfAnotado) return false;
                
                // Filtro de anotador
                if (filtroPdfAnotador && (a.anotador || 'Não informado') !== filtroPdfAnotador) return false;
                
                return true;
            });

            if (dadosPDF.length === 0) {
                showToast('⚠️ Nenhuma anotação selecionada com os filtros atuais');
                return;
            }

            dadosPDF.sort((a, b) => {
                if (ordenarPor === 'data') return new Date(b.data) - new Date(a.data);
                if (ordenarPor === 'turma') return a.turma.localeCompare(b.turma);
                if (ordenarPor === 'nome') return a.nomeGuerra.localeCompare(b.nomeGuerra);
                if (ordenarPor === 'status') {
                    const ordem = { 'abonada': 1, 'justificada': 2, 'punicao': 3 };
                    return ordem[a.situacao] - ordem[b.situacao];
                }
                return 0;
            });

            const doc = new jsPDF({
                orientation: 'landscape',
                unit: 'mm',
                format: 'a4'
            });

            const pageWidth = doc.internal.pageSize.getWidth();
            const pageHeight = doc.internal.pageSize.getHeight();
            const margin = 10;
            let yPos = margin;

            doc.setFillColor(26, 35, 126);
            doc.rect(0, 0, pageWidth, 25, 'F');
            
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(16);
            doc.setFont('helvetica', 'bold');
            doc.text(titulo.toUpperCase(), pageWidth / 2, 12, { align: 'center' });
            
            if (subtitulo) {
                doc.setFontSize(10);
                doc.setFont('helvetica', 'normal');
                doc.text(subtitulo, pageWidth / 2, 20, { align: 'center' });
            }

            yPos = 30;

            doc.setTextColor(100, 100, 100);
            doc.setFontSize(8);
            doc.setFont('helvetica', 'normal');
            const dataGeracao = new Date().toLocaleString('pt-BR');
            doc.text(`Gerado em: ${dataGeracao}`, margin, yPos);
            doc.text(`Total de registros: ${dadosPDF.length}`, pageWidth - margin, yPos, { align: 'right' });
            
            // Mostrar filtros aplicados no PDF
            yPos += 6;
            if (filtroPdfAnotado) {
                doc.text(`Aluno: ${filtroPdfAnotado}`, margin, yPos);
                yPos += 5;
            }
            if (filtroPdfAnotador) {
                doc.text(`Anotador: ${filtroPdfAnotador}`, margin, yPos);
                yPos += 5;
            }
            
            yPos += 3;

            const headers = [
                { header: 'TURMA', dataKey: 'turma' },
                { header: 'Nº', dataKey: 'numero' },
                { header: 'NOME DE GUERRA', dataKey: 'nome' },
                { header: 'DATA', dataKey: 'data' },
                { header: 'ANOTADOR', dataKey: 'anotador' },
                { header: 'NORMA', dataKey: 'norma' },
                { header: 'GRAU', dataKey: 'grau' },
                { header: 'STATUS', dataKey: 'status' },
                { header: 'TIPO PUNIÇÃO', dataKey: 'tipoPunicao' },
                { header: 'MOTIVO', dataKey: 'motivo' }
            ];

            const body = dadosPDF.map(a => {
                let statusText = '';
                if (a.situacao === 'abonada') statusText = 'ABONADA';
                else if (a.situacao === 'justificada') statusText = 'JUSTIFICADA';
                else if (a.situacao === 'punicao') {
                    statusText = a.subStatus === 'cumprida' ? 'PUNIÇÃO-CUMPRIDA' : 'PUNIÇÃO-PENDENTE';
                }

                return {
                    turma: a.turma,
                    numero: a.numero,
                    nome: a.nomeGuerra,
                    data: formatDate(a.data),
                    anotador: a.anotador || '-',
                    norma: a.norma || '-',
                    grau: a.grau || '-',
                    status: statusText,
                    tipoPunicao: a.tipoPunicao || '-',
                    motivo: a.motivo
                };
            });

            const didDrawCell = (data) => {
                if (data.section === 'body' && data.column.dataKey === 'status') {
                    const status = data.cell.raw;
                    if (status === 'ABONADA') {
                        data.cell.styles.fillColor = [227, 242, 253];
                        data.cell.styles.textColor = [33, 150, 243];
                    } else if (status === 'JUSTIFICADA') {
                        data.cell.styles.fillColor = [232, 245, 233];
                        data.cell.styles.textColor = [76, 175, 80];
                    } else if (status === 'PUNIÇÃO-PENDENTE') {
                        data.cell.styles.fillColor = [255, 243, 224];
                        data.cell.styles.textColor = [255, 152, 0];
                    } else if (status === 'PUNIÇÃO-CUMPRIDA') {
                        data.cell.styles.fillColor = [232, 245, 233];
                        data.cell.styles.textColor = [76, 175, 80];
                    }
                }
            };

            doc.autoTable({
                columns: headers,
                body: body,
                startY: yPos,
                margin: { left: margin, right: margin },
                styles: {
                    fontSize: 7,
                    cellPadding: 2,
                    overflow: 'linebreak',
                    font: 'helvetica'
                },
                headStyles: {
                    fillColor: [26, 35, 126],
                    textColor: [255, 255, 255],
                    fontStyle: 'bold',
                    fontSize: 7
                },
                bodyStyles: {
                    textColor: [33, 33, 33]
                },
                alternateRowStyles: {
                    fillColor: [250, 250, 250]
                },
                columnStyles: {
                    turma: { cellWidth: 20 },
                    numero: { cellWidth: 12 },
                    nome: { cellWidth: 35 },
                    data: { cellWidth: 18 },
                    anotador: { cellWidth: 35 },
                    norma: { cellWidth: 15 },
                    grau: { cellWidth: 15 },
                    status: { cellWidth: 28, fontStyle: 'bold' },
                    tipoPunicao: { cellWidth: 25 },
                    motivo: { cellWidth: 'auto' }
                },
                didDrawCell: didDrawCell,
                didDrawPage: (data) => {
                    doc.setFontSize(8);
                    doc.setTextColor(150, 150, 150);
                    const pageCount = doc.internal.getNumberOfPages();
                    const currentPage = doc.internal.getCurrentPageInfo().pageNumber;
                    doc.text(`Página ${currentPage} de ${pageCount}`, pageWidth / 2, pageHeight - 5, { align: 'center' });
                }
            });

            const nomeArquivo = `relatorio_anotacoes_${new Date().toISOString().split('T')[0]}.pdf`;
            doc.save(nomeArquivo);
            
            closePdfModal();
            showToast(`📄 PDF gerado com ${dadosPDF.length} registros!`);
        }

        function exportData() {
            const dataStr = JSON.stringify(anotacoes, null, 2);
            const dataBlob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(dataBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `anotacoes_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('📤 BACKUP exportado!');
        }

        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if (Array.isArray(data)) {
                            if (confirm(`Importar ${data.length} anotações? Isso adicionará aos dados existentes.`)) {
                                anotacoes = [...anotacoes, ...data];
                                localStorage.setItem('anotacoes', JSON.stringify(anotacoes));
                                renderAnotacoes();
                                updateStats();
                                showToast('📥 BACKUP importado com sucesso!');
                            }
                        }
                    } catch (err) {
                        showToast('❌ Erro ao importar arquivo');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function clearAll() {
            if (confirm('ATENÇÃO: Isso apagará TODAS as anotações! Deseja continuar?')) {
                anotacoes = [];
                localStorage.setItem('anotacoes', JSON.stringify(anotacoes));
                renderAnotacoes();
                updateStats();
                showToast('🗑️ Todas as anotações foram removidas');
            }
        }

        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeModal();
        });

        document.getElementById('pdf-modal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closePdfModal();
        });

        document.getElementById('filter-anotado-modal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeFilterAnotadoModal();
        });

        document.getElementById('filter-anotador-modal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeFilterAnotadorModal();
        });
    </script>
</body>
</html>
