<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <link rel="manifest" href="./manifest.json">
    
    <meta name="theme-color" content="#1a237e">
    <meta name="msapplication-TileColor" content="#1a237e">
    <meta name="msapplication-navbutton-color" content="#1a237e">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Anotações">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="Anotações">
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect fill='%231a237e' width='192' height='192' rx='30'/%3E%3Cpath fill='none' stroke='white' stroke-width='8' stroke-linecap='round' stroke-linejoin='round' d='M126 40H66c-13.3 0-24 10.7-24 24v64c0 13.3 10.7 24 24 24h60c13.3 0 24-10.7 24-24V64c0-13.3-10.7-24-24-24zm-24 84H66V72h36v52zm24-48h-12V48h12v28zM72 108h24v-4H72v4zm0 16h24v-4H72v4z'/%3E%3C/svg%3E">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect fill='%231a237e' width='180' height='180' rx='40'/%3E%3Cpath fill='none' stroke='white' stroke-width='8' stroke-linecap='round' stroke-linejoin='round' d='M118 38H62c-13.3 0-24 10.7-24 24v56c0 13.3 10.7 24 24 24h56c13.3 0 24-10.7 24-24V62c0-13.3-10.7-24-24-24zm-24 76H62V68h32v46zm24-44h-12V46h12v24zM68 104h24v-4H68v4zm0 16h24v-4H68v4z'/%3E%3C/svg%3E">
    
    <title>Sistema de Anotações</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then((registration) => {
                        console.log('[PWA] SW registrado:', registration.scope);
                    })
                    .catch((error) => {
                        console.log('[PWA] Falha no registro do SW:', error);
                    });
            });
        }
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #1a237e;
            --primary-light: #3949ab;
            --accent: #ff4081;
            --success: #4caf50;
            --warning: #ff9800;
            --danger: #f44336;
            --info: #2196f3;
            --bg: #f5f5f5;
            --card: #ffffff;
            --text: #212121;
            --text-secondary: #757575;
            --border: #e0e0e0;
            --sidebar-width: 280px;
            --max-content-width: 1400px;
        }

        html {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            overscroll-behavior: none;
        }

        @media (min-width: 1024px) {
            body {
                flex-direction: row;
            }
        }

        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            padding: 16px 20px;
            padding-top: max(16px, env(safe-area-inset-top));
            box-shadow: 0 4px 20px rgba(26, 35, 126, 0.3);
            z-index: 100;
            flex-shrink: 0;
            padding-left: max(20px, env(safe-area-inset-left));
            padding-right: max(20px, env(safe-area-inset-right));
        }

        @media (min-width: 1024px) {
            .header {
                width: var(--sidebar-width);
                height: 100vh;
                height: 100dvh;
                display: flex;
                flex-direction: column;
                padding: 24px;
                padding-top: max(24px, env(safe-area-inset-top));
                position: fixed;
                left: 0;
                top: 0;
            }
        }

        .header-top {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        @media (min-width: 1024px) {
            .header-top {
                flex-direction: column;
                text-align: center;
                margin-bottom: 24px;
            }
        }

        .back-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            flex-shrink: 0;
            text-decoration: none;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.05);
        }

        @media (min-width: 1024px) {
            .back-btn {
                width: 100%;
                border-radius: 12px;
                justify-content: flex-start;
                padding: 0 16px;
                gap: 12px;
            }
            
            .back-btn::after {
                content: 'Voltar ao Início';
                font-size: 0.95rem;
                font-weight: 500;
            }
        }

        .header h1 {
            font-size: 1.3rem;
            font-weight: 600;
            flex: 1;
        }

        @media (min-width: 1024px) {
            .header h1 {
                font-size: 1.5rem;
            }
        }

        .header-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        @media (min-width: 1024px) {
            .header-actions {
                flex-direction: column;
                gap: 12px;
            }
        }

        .btn-icon {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            -webkit-touch-callout: none;
            user-select: none;
        }

        @media (min-width: 1024px) {
            .btn-icon {
                width: 100%;
                height: auto;
                padding: 12px 16px;
                border-radius: 12px;
                justify-content: flex-start;
                gap: 12px;
                font-size: 0.95rem;
                font-weight: 500;
            }
            
            .btn-icon::after {
                content: attr(title);
            }
        }

        .btn-icon:active {
            transform: scale(0.95);
            background: rgba(255,255,255,0.3);
        }

        .content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 16px;
            padding-bottom: max(80px, env(safe-area-inset-bottom) + 80px);
            padding-left: max(16px, env(safe-area-inset-left));
            padding-right: max(16px, env(safe-area-inset-right));
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain;
        }

        @media (min-width: 1024px) {
            .content {
                margin-left: var(--sidebar-width);
                padding: 32px;
                max-width: calc(var(--max-content-width) - var(--sidebar-width));
                padding-bottom: 32px;
            }
        }

        @media (min-width: 1400px) {
            .content {
                max-width: calc(100% - var(--sidebar-width));
                padding: 40px;
            }
        }

        .filters {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            overflow-x: auto;
            padding-bottom: 4px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .filters::-webkit-scrollbar {
            display: none;
        }

        @media (min-width: 1024px) {
            .filters {
                flex-wrap: wrap;
                overflow-x: visible;
                gap: 12px;
            }
        }

        .filter-chip {
            padding: 8px 16px;
            border-radius: 20px;
            border: 2px solid var(--border);
            background: white;
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
            -webkit-touch-callout: none;
            user-select: none;
        }

        @media (min-width: 1024px) {
            .filter-chip {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }

        .filter-chip.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .filter-chip.has-selection {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .cards-container {
            display: grid;
            gap: 12px;
        }

        @media (min-width: 768px) {
            .cards-container {
                grid-template-columns: repeat(2, 1fr);
                gap: 16px;
            }
        }

        @media (min-width: 1400px) {
            .cards-container {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            border-left: 4px solid var(--border);
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }

        @media (min-width: 1024px) {
            .card {
                padding: 20px;
            }
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
        }

        .card:active {
            transform: scale(0.98);
        }

        .card.abonada {
            border-left-color: var(--info);
        }

        .card.justificada {
            border-left-color: var(--success);
        }

        .card.punicao-pendente {
            border-left-color: var(--warning);
        }

        .card.punicao-cumprida {
            border-left-color: var(--success);
            opacity: 0.9;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            gap: 10px;
        }

        .soldado-info {
            flex: 1;
            min-width: 0;
        }

        .turma-badge {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 6px;
        }

        @media (min-width: 1024px) {
            .turma-badge {
                font-size: 0.8rem;
                padding: 6px 12px;
            }
        }

        .nome-guerra {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 4px;
            word-break: break-word;
        }

        @media (min-width: 1024px) {
            .nome-guerra {
                font-size: 1.2rem;
            }
        }

        .numero {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .status-section {
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: flex-end;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        @media (min-width: 1024px) {
            .status-badge {
                font-size: 0.8rem;
                padding: 8px 14px;
            }
        }

        .status-badge.abonada {
            background: #e3f2fd;
            color: var(--info);
        }

        .status-badge.justificada {
            background: #e8f5e9;
            color: var(--success);
        }

        .status-badge.punicao {
            background: #fff3e0;
            color: var(--warning);
        }

        .status-badge.punicao.cumprida {
            background: #e8f5e9;
            color: var(--success);
        }

        .sub-status {
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 12px;
            font-weight: 600;
        }

        @media (min-width: 1024px) {
            .sub-status {
                font-size: 0.75rem;
            }
        }

        .sub-status.pendente {
            background: #fff3e0;
            color: var(--warning);
        }

        .sub-status.cumprida {
            background: #e8f5e9;
            color: var(--success);
        }

        .card-body {
            margin-bottom: 12px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid var(--border);
            gap: 10px;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 500;
            flex-shrink: 0;
        }

        @media (min-width: 1024px) {
            .info-label {
                font-size: 0.85rem;
            }
        }

        .info-value {
            font-size: 0.85rem;
            color: var(--text);
            font-weight: 600;
            text-align: right;
            word-break: break-word;
        }

        @media (min-width: 1024px) {
            .info-value {
                font-size: 0.9rem;
            }
        }

        .motivo {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 10px;
            margin-top: 10px;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        @media (min-width: 1024px) {
            .motivo {
                padding: 14px;
                font-size: 0.95rem;
            }
        }

        .card-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .btn-small {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            -webkit-touch-callout: none;
            user-select: none;
        }

        @media (min-width: 1024px) {
            .btn-small {
                padding: 12px;
                font-size: 0.9rem;
            }
        }

        .btn-edit {
            background: #e3f2fd;
            color: var(--primary);
        }

        .btn-edit:hover {
            background: #bbdefb;
        }

        .btn-delete {
            background: #ffebee;
            color: var(--danger);
        }

        .btn-delete:hover {
            background: #ffcdd2;
        }

        .btn-small:active {
            transform: scale(0.95);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            display: flex;
            align-items: flex-end;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--card);
            width: 100%;
            max-height: 90vh;
            max-height: 90dvh;
            border-radius: 24px 24px 0 0;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 768px) {
            .modal {
                max-width: 600px;
                margin: 0 auto;
                border-radius: 24px;
                max-height: 85vh;
            }
            
            .modal-overlay {
                align-items: center;
                padding: 20px;
            }
        }

        .modal-overlay.active .modal {
            transform: translateY(0);
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .modal-title {
            font-size: 1.2rem;
            font-weight: 700;
        }

        .btn-close {
            background: none;
            border: none;
            font-size: 1.8rem;
            color: var(--text-secondary);
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .modal-body {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s;
            background: white;
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-textarea {
            min-height: 80px;
            resize: vertical;
        }

        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
        }

        .radio-option.selected {
            border-color: var(--primary);
            background: #e8eaf6;
        }

        .radio-option input[type="radio"] {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            accent-color: var(--primary);
        }

        .sub-options {
            margin-left: 32px;
            margin-top: 10px;
            display: none;
        }

        .sub-options.show {
            display: block;
        }

        .modal-footer {
            padding: 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
        }

        .btn-primary {
            flex: 1;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-secondary {
            flex: 1;
            background: transparent;
            color: var(--text-secondary);
            border: 2px solid var(--border);
            padding: 16px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .fab {
            position: fixed;
            bottom: max(24px, env(safe-area-inset-bottom));
            right: max(24px, env(safe-area-inset-right));
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--accent) 0%, #f50057 100%);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 2rem;
            box-shadow: 0 6px 20px rgba(255, 64, 129, 0.4);
            cursor: pointer;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (min-width: 1024px) {
            .fab {
                width: auto;
                height: auto;
                padding: 16px 32px;
                border-radius: 50px;
                font-size: 1rem;
                font-weight: 600;
                gap: 8px;
            }
            
            .fab::after {
                content: 'Nova Anotação';
            }
        }

        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #333;
            color: white;
            padding: 14px 24px;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: 500;
            z-index: 2000;
            opacity: 0;
            transition: all 0.3s;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .stats-bar {
            display: flex;
            justify-content: space-around;
            padding: 12px;
            background: white;
            border-radius: 12px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            animation: fadeInUp 0.4s ease-out;
        }

        /* PDF Modal Styles */
        .pdf-filters {
            margin-bottom: 20px;
        }

        .pdf-filter-group {
            margin-bottom: 16px;
        }

        .pdf-filter-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
        }

        .pdf-filter-options {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .pdf-filter-chip {
            padding: 6px 12px;
            border-radius: 16px;
            border: 2px solid var(--border);
            background: white;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .pdf-filter-chip.selected {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .search-filter-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .search-filter-input:focus {
            outline: none;
            border-color: var(--primary);
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-top">
            <a href="./index.html" class="back-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </a>
            <h1>Anotações</h1>
        </div>
        
        <div class="header-actions">
            <button class="btn-icon" onclick="openPdfModal()" title="Exportar PDF">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
            </button>
            <button class="btn-icon" onclick="exportData()" title="Exportar Dados">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
            </button>
            <button class="btn-icon" onclick="importData()" title="Importar Dados">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
            </button>
            <button class="btn-icon" onclick="clearAll()" title="Limpar Tudo">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                </svg>
            </button>
        </div>
    </header>

    <main class="content">
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="stat-total">0</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-abonadas">0</div>
                <div class="stat-label">Abonadas</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-justificadas">0</div>
                <div class="stat-label">Justificadas</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-punicoes">0</div>
                <div class="stat-label">Punições</div>
            </div>
        </div>

        <div class="filters">
            <button class="filter-chip active" onclick="filterStatus('todos')">Todos</button>
            <button class="filter-chip" onclick="filterStatus('abonada')">Abonadas</button>
            <button class="filter-chip" onclick="filterStatus('justificada')">Justificadas</button>
            <button class="filter-chip" onclick="filterStatus('punicao')">Punições</button>
        </div>
        
        <div class="cards-container" id="lista-anotacoes"></div>
    </main>

    <button class="fab" onclick="openModal()">+</button>

    <!-- Modal de Anotação -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title" id="modal-title">Nova Anotação</h2>
                <button class="btn-close" onclick="closeModal()">&times;</button>
            </div>
            
            <div class="modal-body">
                <form id="form-anotacao">
                    <input type="hidden" id="id">
                    
                    <div class="form-group">
                        <label class="form-label">Turma *</label>
                        <select class="form-select" id="turma" required>
                            <option value="">Selecione...</option>
                            <option value="CFSD">CFSD</option>
                            <option value="CFS">CFS</option>
                            <option value="NUFAP 15">NUFAP 15</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Número *</label>
                        <input type="number" class="form-input" id="numero" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Nome de Guerra *</label>
                        <input type="text" class="form-input" id="nome-guerra" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Data *</label>
                        <input type="date" class="form-input" id="data" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Anotador</label>
                        <input type="text" class="form-input" id="anotador">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Norma 25</label>
                        <input type="text" class="form-input" id="norma">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Grau</label>
                        <select class="form-select" id="grau">
                            <option value="LEVE">LEVE (L)</option>
                            <option value="MÉDIA">MÉDIA (M)</option>
                            <option value="GRAVE">GRAVE (G)</option>
                            <option value="GRAVÍSSIMA">GRAVÍSSIMA (GA)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Motivo *</label>
                        <textarea class="form-textarea" id="motivo" required></textarea>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Situação *</label>
                        <div class="radio-group">
                            <label class="radio-option" onclick="selectSituacao('abonada')">
                                <input type="radio" name="situacao" value="abonada">
                                <span>Abonada</span>
                            </label>
                            <label class="radio-option" onclick="selectSituacao('justificada')">
                                <input type="radio" name="situacao" value="justificada">
                                <span>Justificada</span>
                            </label>
                            <label class="radio-option" onclick="selectSituacao('punicao')">
                                <input type="radio" name="situacao" value="punicao">
                                <span>Punição</span>
                            </label>
                        </div>
                        
                        <div class="sub-options" id="sub-punicao">
                            <label class="form-label">Estado</label>
                            <select class="form-select" id="sub-status">
                                <option value="pendente">Pendente</option>
                                <option value="cumprida">Cumprida</option>
                            </select>
                            <label class="form-label" style="margin-top:10px">Tipo</label>
                            <input type="text" class="form-input" id="tipo-punicao" placeholder="Ex: RR, ID, TEHM">
                        </div>
                    </div>
                </form>
            </div>
            
            <div class="modal-footer">
                <button type="button" class="btn-secondary" onclick="closeModal()">Cancelar</button>
                <button type="button" class="btn-primary" onclick="saveAnotacao()">Salvar</button>
            </div>
        </div>
    </div>

    <!-- Modal de Filtros PDF -->
    <div class="modal-overlay" id="pdf-modal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">Exportar Relatório PDF</h2>
                <button class="btn-close" onclick="closePdfModal()">&times;</button>
            </div>
            
            <div class="modal-body">
                <div class="pdf-filters">
                    <div class="pdf-filter-group">
                        <div class="pdf-filter-title">📋 Status da Anotação</div>
                        <div class="pdf-filter-options" id="pdf-status-filters">
                            <span class="pdf-filter-chip selected" data-value="todos">Todos</span>
                            <span class="pdf-filter-chip" data-value="abonada">Abonadas</span>
                            <span class="pdf-filter-chip" data-value="justificada">Justificadas</span>
                            <span class="pdf-filter-chip" data-value="punicao">Punições</span>
                        </div>
                    </div>

                    <div class="pdf-filter-group">
                        <div class="pdf-filter-title">👤 Filtrar por Anotado (Nome de Guerra)</div>
                        <input type="text" class="search-filter-input" id="pdf-anotado-filter" placeholder="Digite o nome de guerra...">
                        <div class="pdf-filter-options" id="pdf-anotado-chips"></div>
                    </div>

                    <div class="pdf-filter-group">
                        <div class="pdf-filter-title">✍️ Filtrar por Anotador</div>
                        <input type="text" class="search-filter-input" id="pdf-anotador-filter" placeholder="Digite o nome do anotador...">
                        <div class="pdf-filter-options" id="pdf-anotador-chips"></div>
                    </div>
                </div>
            </div>
            
            <div class="modal-footer">
                <button type="button" class="btn-secondary" onclick="closePdfModal()">Cancelar</button>
                <button type="button" class="btn-primary" onclick="generatePDF()">📄 Gerar PDF</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let anotacoes = JSON.parse(localStorage.getItem('anotacoes')) || [];
        let filtroAtual = 'todos';
        let editandoId = null;
        let situacaoSelecionada = null;

        // Filtros PDF
        let pdfFilters = {
            status: 'todos',
            anotados: [],
            anotadores: []
        };

        document.addEventListener('DOMContentLoaded', () => {
            renderAnotacoes();
            updateStats();
            document.getElementById('data').value = new Date().toISOString().split('T')[0];
            setupPdfFilters();
        });

        function setupPdfFilters() {
            // Status filters
            document.querySelectorAll('#pdf-status-filters .pdf-filter-chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    document.querySelectorAll('#pdf-status-filters .pdf-filter-chip').forEach(c => c.classList.remove('selected'));
                    chip.classList.add('selected');
                    pdfFilters.status = chip.dataset.value;
                });
            });

            // Anotado filter with autocomplete
            const anotadoInput = document.getElementById('pdf-anotado-filter');
            anotadoInput.addEventListener('input', (e) => {
                const value = e.target.value.toUpperCase();
                const chipsContainer = document.getElementById('pdf-anotado-chips');
                
                if (value.length < 2) {
                    chipsContainer.innerHTML = '';
                    return;
                }

                const matches = [...new Set(anotacoes
                    .map(a => a.nomeGuerra)
                    .filter(n => n && n.toUpperCase().includes(value)))]
                    .slice(0, 5);

                chipsContainer.innerHTML = matches.map(nome => 
                    `<span class="pdf-filter-chip" onclick="addAnotadoFilter('${nome}')">${nome}</span>`
                ).join('');
            });

            // Anotador filter with autocomplete
            const anotadorInput = document.getElementById('pdf-anotador-filter');
            anotadorInput.addEventListener('input', (e) => {
                const value = e.target.value.toUpperCase();
                const chipsContainer = document.getElementById('pdf-anotador-chips');
                
                if (value.length < 2) {
                    chipsContainer.innerHTML = '';
                    return;
                }

                const matches = [...new Set(anotacoes
                    .map(a => a.anotador)
                    .filter(a => a && a.toUpperCase().includes(value)))]
                    .slice(0, 5);

                chipsContainer.innerHTML = matches.map(nome => 
                    `<span class="pdf-filter-chip" onclick="addAnotadorFilter('${nome}')">${nome}</span>`
                ).join('');
            });
        }

        function addAnotadoFilter(nome) {
            if (!pdfFilters.anotados.includes(nome)) {
                pdfFilters.anotados.push(nome);
                updateFilterChips('pdf-anotado-chips', pdfFilters.anotados, 'anotados');
            }
            document.getElementById('pdf-anotado-filter').value = '';
            document.getElementById('pdf-anotado-chips').innerHTML = '';
        }

        function addAnotadorFilter(nome) {
            if (!pdfFilters.anotadores.includes(nome)) {
                pdfFilters.anotadores.push(nome);
                updateFilterChips('pdf-anotador-chips', pdfFilters.anotadores, 'anotadores');
            }
            document.getElementById('pdf-anotador-filter').value = '';
            document.getElementById('pdf-anotador-chips').innerHTML = '';
        }

        function updateFilterChips(containerId, items, type) {
            const container = document.getElementById(containerId);
            container.innerHTML = items.map((item, idx) => 
                `<span class="pdf-filter-chip selected" onclick="removeFilter('${type}', ${idx})">${item} ✕</span>`
            ).join('');
        }

        function removeFilter(type, idx) {
            pdfFilters[type].splice(idx, 1);
            updateFilterChips(type === 'anotados' ? 'pdf-anotado-chips' : 'pdf-anotador-chips', 
                            pdfFilters[type], type);
        }

        function openPdfModal() {
            pdfFilters = { status: 'todos', anotados: [], anotadores: [] };
            document.querySelectorAll('#pdf-status-filters .pdf-filter-chip').forEach(c => c.classList.remove('selected'));
            document.querySelector('#pdf-status-filters [data-value="todos"]').classList.add('selected');
            document.getElementById('pdf-anotado-chips').innerHTML = '';
            document.getElementById('pdf-anotador-chips').innerHTML = '';
            document.getElementById('pdf-anotado-filter').value = '';
            document.getElementById('pdf-anotador-filter').value = '';
            document.getElementById('pdf-modal').classList.add('active');
        }

        function closePdfModal() {
            document.getElementById('pdf-modal').classList.remove('active');
        }

        function generatePDF() {
            if (anotacoes.length === 0) {
                showToast('Não há anotações para exportar');
                return;
            }
            
            // Aplicar filtros
            let filtered = anotacoes;
            
            if (pdfFilters.status !== 'todos') {
                filtered = filtered.filter(a => a.situacao === pdfFilters.status);
            }
            
            if (pdfFilters.anotados.length > 0) {
                filtered = filtered.filter(a => pdfFilters.anotados.includes(a.nomeGuerra));
            }
            
            if (pdfFilters.anotadores.length > 0) {
                filtered = filtered.filter(a => pdfFilters.anotadores.includes(a.anotador));
            }
            
            if (filtered.length === 0) {
                showToast('Nenhuma anotação corresponde aos filtros selecionados');
                return;
            }
            
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: 'landscape' });
            
            doc.setFillColor(26, 35, 126);
            doc.rect(0, 0, doc.internal.pageSize.getWidth(), 25, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(16);
            doc.text('RELATÓRIO DE ANOTAÇÕES', doc.internal.pageSize.getWidth() / 2, 15, { align: 'center' });
            
            // Info dos filtros aplicados
            doc.setFontSize(9);
            let filterText = 'Filtros: ';
            if (pdfFilters.status !== 'todos') filterText += `Status: ${pdfFilters.status.toUpperCase()} | `;
            if (pdfFilters.anotados.length > 0) filterText += `Anotados: ${pdfFilters.anotados.join(', ')} | `;
            if (pdfFilters.anotadores.length > 0) filterText += `Anotadores: ${pdfFilters.anotadores.join(', ')} | `;
            filterText += `Total: ${filtered.length} registros`;
            doc.text(filterText, doc.internal.pageSize.getWidth() / 2, 22, { align: 'center' });
            
            const headers = [['TURMA', 'Nº', 'NOME', 'ANOTADOR', 'DATA', 'STATUS', 'MOTIVO']];
            const data = filtered.map(a => [
                a.turma, 
                a.numero, 
                a.nomeGuerra, 
                a.anotador || '-',
                formatDate(a.data), 
                a.situacao.toUpperCase() + (a.subStatus === 'cumprida' ? ' (C)' : ''), 
                a.motivo.substring(0, 50) + (a.motivo.length > 50 ? '...' : '')
            ]);
            
            doc.autoTable({
                head: headers,
                body: data,
                startY: 30,
                styles: { fontSize: 9 },
                headStyles: { fillColor: [26, 35, 126] }
            });
            
            doc.save(`relatorio_anotacoes_${new Date().toISOString().split('T')[0]}.pdf`);
            closePdfModal();
            showToast('PDF gerado com sucesso!');
        }

        function updateStats() {
            document.getElementById('stat-total').textContent = anotacoes.length;
            document.getElementById('stat-abonadas').textContent = anotacoes.filter(a => a.situacao === 'abonada').length;
            document.getElementById('stat-justificadas').textContent = anotacoes.filter(a => a.situacao === 'justificada').length;
            document.getElementById('stat-punicoes').textContent = anotacoes.filter(a => a.situacao === 'punicao').length;
        }

        function renderAnotacoes() {
            const container = document.getElementById('lista-anotacoes');
            let filtradas = anotacoes;
            
            if (filtroAtual !== 'todos') {
                filtradas = anotacoes.filter(a => a.situacao === filtroAtual);
            }
            
            filtradas.sort((a, b) => new Date(b.data) - new Date(a.data));

            if (filtradas.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-icon">📝</div><div class="empty-text">Nenhuma anotação</div></div>';
                return;
            }

            container.innerHTML = filtradas.map(a => {
                let cardClass = a.situacao;
                let statusText = '';
                let subStatusText = '';
                
                if (a.situacao === 'abonada') statusText = 'ABONADA';
                else if (a.situacao === 'justificada') statusText = 'JUSTIFICADA';
                else if (a.situacao === 'punicao') {
                    statusText = 'PUNIÇÃO';
                    subStatusText = a.subStatus === 'cumprida' ? ' - CUMPRIDA' : ' - PENDENTE';
                    cardClass += a.subStatus === 'pendente' ? ' punicao-pendente' : ' punicao-cumprida';
                }

                return `
                    <div class="card ${cardClass}">
                        <div class="card-header">
                            <div class="soldado-info">
                                <span class="turma-badge">${a.turma}</span>
                                <div class="nome-guerra">${a.nomeGuerra}</div>
                                <div class="numero">Nº ${a.numero}</div>
                            </div>
                            <div class="status-section">
                                <span class="status-badge ${a.situacao}">${statusText}${subStatusText}</span>
                            </div>
                        </div>
                        <div class="card-body">
                            <div class="info-row">
                                <span class="info-label">Data</span>
                                <span class="info-value">${formatDate(a.data)}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Anotador</span>
                                <span class="info-value">${a.anotador || '-'}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Norma</span>
                                <span class="info-value">${a.norma || '-'} (${a.grau || '-'})</span>
                            </div>
                            <div class="motivo"><strong>Motivo:</strong> ${a.motivo}</div>
                        </div>
                        <div class="card-actions">
                            <button class="btn-small btn-edit" onclick="editAnotacao('${a.id}')">✏️ Editar</button>
                            <button class="btn-small btn-delete" onclick="deleteAnotacao('${a.id}')">🗑️ Excluir</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openModal(id = null) {
            editandoId = id;
            document.getElementById('modal-title').textContent = id ? 'Editar Anotação' : 'Nova Anotação';
            
            if (id) {
                const a = anotacoes.find(x => x.id === id);
                document.getElementById('turma').value = a.turma;
                document.getElementById('numero').value = a.numero;
                document.getElementById('nome-guerra').value = a.nomeGuerra;
                document.getElementById('data').value = a.data;
                document.getElementById('anotador').value = a.anotador || '';
                document.getElementById('norma').value = a.norma || '';
                document.getElementById('grau').value = a.grau || 'LEVE';
                document.getElementById('motivo').value = a.motivo;
                selectSituacao(a.situacao);
                if (a.situacao === 'punicao') {
                    document.getElementById('sub-status').value = a.subStatus || 'pendente';
                    document.getElementById('tipo-punicao').value = a.tipoPunicao || '';
                }
            } else {
                document.getElementById('form-anotacao').reset();
                document.getElementById('data').value = new Date().toISOString().split('T')[0];
                document.querySelectorAll('.radio-option').forEach(opt => opt.classList.remove('selected'));
                document.getElementById('sub-punicao').classList.remove('show');
            }
            
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            editandoId = null;
        }

        function selectSituacao(situacao) {
            situacaoSelecionada = situacao;
            document.querySelectorAll('.radio-option').forEach(opt => opt.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
            
            const subPunicao = document.getElementById('sub-punicao');
            if (situacao === 'punicao') {
                subPunicao.classList.add('show');
            } else {
                subPunicao.classList.remove('show');
            }
        }

        function saveAnotacao() {
            const turma = document.getElementById('turma').value;
            const numero = document.getElementById('numero').value;
            const nomeGuerra = document.getElementById('nome-guerra').value;
            const data = document.getElementById('data').value;
            const motivo = document.getElementById('motivo').value;
            
            if (!turma || !numero || !nomeGuerra || !data || !motivo || !situacaoSelecionada) {
                showToast('Preencha todos os campos obrigatórios');
                return;
            }

            const anotacao = {
                id: editandoId || Date.now().toString(),
                turma,
                numero,
                nomeGuerra: nomeGuerra.toUpperCase(),
                data,
                anotador: document.getElementById('anotador').value,
                norma: document.getElementById('norma').value,
                grau: document.getElementById('grau').value,
                motivo,
                situacao: situacaoSelecionada,
                subStatus: situacaoSelecionada === 'punicao' ? document.getElementById('sub-status').value : null,
                tipoPunicao: situacaoSelecionada === 'punicao' ? document.getElementById('tipo-punicao').value : null
            };

            if (editandoId) {
                const index = anotacoes.findIndex(a => a.id === editandoId);
                anotacoes[index] = anotacao;
                showToast('Anotação atualizada!');
            } else {
                anotacoes.unshift(anotacao);
                showToast('Anotação adicionada!');
            }

            localStorage.setItem('anotacoes', JSON.stringify(anotacoes));
            renderAnotacoes();
            updateStats();
            closeModal();
        }

        function editAnotacao(id) {
            openModal(id);
        }

        function deleteAnotacao(id) {
            if (confirm('Excluir esta anotação?')) {
                anotacoes = anotacoes.filter(a => a.id !== id);
                localStorage.setItem('anotacoes', JSON.stringify(anotacoes));
                renderAnotacoes();
                updateStats();
                showToast('Anotação excluída');
            }
        }

        function filterStatus(status) {
            filtroAtual = status;
            document.querySelectorAll('.filter-chip').forEach(chip => chip.classList.remove('active'));
            event.target.classList.add('active');
            renderAnotacoes();
        }

        function formatDate(dateStr) {
            const [ano, mes, dia] = dateStr.split('-');
            return `${dia}/${mes}/${ano}`;
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function exportData() {
            const dataStr = JSON.stringify(anotacoes, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `anotacoes_backup_${new Date().toISOString().split('T')[0]}.json`;
            link.click();
            URL.revokeObjectURL(url);
            showToast('Dados exportados!');
        }

        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const dados = JSON.parse(event.target.result);
                        if (confirm(`Importar ${dados.length} anotações?`)) {
                            anotacoes = dados;
                            localStorage.setItem('anotacoes', JSON.stringify(anotacoes));
                            renderAnotacoes();
                            updateStats();
                            showToast('Dados importados!');
                        }
                    } catch (err) {
                        showToast('Erro ao importar');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function clearAll() {
            if (anotacoes.length === 0) return;
            if (confirm('ATENÇÃO: Apagar TODAS as anotações?')) {
                if (confirm('Confirmação final: Deseja realmente excluir todos os dados?')) {
                    anotacoes = [];
                    localStorage.removeItem('anotacoes');
                    renderAnotacoes();
                    updateStats();
                    showToast('Todos os dados apagados');
                }
            }
        }

        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') closeModal();
        });

        document.getElementById('pdf-modal').addEventListener('click', (e) => {
            if (e.target.id === 'pdf-modal') closePdfModal();
        });
    </script>
</body>
</html>
